<text_never_used_51bce0c785ca2f68081bfa7d91973934>name: Deployment Status

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pre-deployment:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.create-issue.outputs.result }}
      prev_sha: ${{ steps.get-info.outputs.prev_sha }}
      curr_sha: ${{ steps.get-info.outputs.curr_sha }}
      package_version: ${{ steps.get-info.outputs.package_version }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Dependencies
      run: npm ci

    - name: Run Lint and Test
      run: |
        npm run lint --if-present
        npm test --if-present

    - name: Get Commit and Version Info
      id: get-info
      run: |
        echo "curr_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        echo "prev_sha=$(git rev-parse HEAD^)" >> $GITHUB_OUTPUT
        echo "package_version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

    - name: Create Deployment Tracking Issue
      id: create-issue
      uses: actions/github-script@v7
      with:
        script: |
          const sha = context.sha;
          const { data: issue } = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Deployment Tracking - ${sha}`,
            body: `Deployment started for commit ${sha}`,
            labels: ['deployment', 'in-progress']
          });
          return issue.number;

    - name: Post Pre-deployment Comment
      uses: actions/github-script@v7
      with:
        script: |
          const issue_number = ${{ steps.create-issue.outputs.result }};
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            body: "Pre-deployment checks completed"
          });

  rollback-preparation:
    needs: pre-deployment
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Create Rollback Artifacts
      id: create-artifacts
      run: |
        mkdir rollback-artifacts
        
        # 1. Executable rollback script
        cat << 'EOF' > rollback-artifacts/rollback.sh
        #!/bin/bash
        set -e
        echo "Starting rollback process..."
        if [ -f "package-lock.json.bak" ]; then
          cp package-lock.json.bak package-lock.json
          echo "Restored package-lock.json"
        fi
        if [ -f "package.json.bak" ]; then
          cp package.json.bak package.json
          echo "Restored package.json"
        fi
        npm ci
        echo "Rollback completed successfully."
        EOF
        chmod +x rollback-artifacts/rollback.sh

        # 2. Configuration backups
        cp package.json rollback-artifacts/package.json.bak
        cp package-lock.json rollback-artifacts/package-lock.json.bak || echo "No package-lock.json found"
        echo "{}" > rollback-artifacts/env-template.json

        # 3. Dependency verification script
        cat << 'EOF' > rollback-artifacts/verify-deps.js
        const fs = require('fs');
        console.log('Verifying dependencies...');
        // Simple verification logic
        if (fs.existsSync('package.json')) process.exit(0);
        process.exit(1);
        EOF

        # 4. Rollback documentation
        cat << 'EOF' > rollback-artifacts/ROLLBACK.md
        # Rollback Instructions
        1. Download the artifact
        2. Run ./rollback.sh
        3. Verify application status
        EOF

        # 5. Compress and Checksum
        tar -czf rollback-package-${{ needs.pre-deployment.outputs.curr_sha }}.tar.gz -C rollback-artifacts .
        sha256sum rollback-package-${{ needs.pre-deployment.outputs.curr_sha }}.tar.gz > checksum.txt
        echo "checksum=$(cat checksum.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

    - name: Upload Rollback Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: rollback-package-${{ needs.pre-deployment.outputs.curr_sha }}
        path: rollback-package-${{ needs.pre-deployment.outputs.curr_sha }}.tar.gz
        retention-days: 30

    - name: Post Rollback Plan Comment
      uses: actions/github-script@v7
      with:
        script: |
          const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
          const prev_sha = "${{ needs.pre-deployment.outputs.prev_sha }}";
          const curr_sha = "${{ needs.pre-deployment.outputs.curr_sha }}";
          const version = "${{ needs.pre-deployment.outputs.package_version }}";
          const checksum = "${{ steps.create-artifacts.outputs.checksum }}";
          
          const body = `
          # 🔄 Rollback Plan Ready
          
          - Previous Commit: ${prev_sha}
          - Current Commit: ${curr_sha}
          - Package Version: ${version}
          - Artifact: rollback-package-${curr_sha}
          
          ## Verification
          - [x] Executable rollback script created
          - [x] Configuration backups completed
          - [x] Dependency verification script generated
          - [x] Rollback documentation created
          - [x] Compressed rollback package with SHA256 checksum
          
          ## Quick Rollback Command
          \`\`\`bash
          ./rollback.sh
          \`\`\`
          
          ## Status
          - Rollback script created: true
          - Configuration backup: true
          - Artifact checksum: SHA256: ${checksum}
          `;
          
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            body: body
          });

  post-deployment:
    needs: [pre-deployment, rollback-preparation]
    runs-on: ubuntu-latest
    if: success()
    steps:
    - name: Update Issue Status
      uses: actions/github-script@v7
      with:
        script: |
          const issue_number = ${{ needs.pre-deployment.outputs.issue_number }};
          
          // Remove in-progress label
          await github.rest.issues.removeLabel({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            name: 'in-progress'
          }).catch(err => console.log('Label might not exist or already removed'));
          
          // Add completed label
          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            labels: ['completed']
          });
          
          // Post final comment
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            body: "Deployment Completed Successfully\n\nRollback artifacts have been uploaded for this deployment."
          });
          
          // Close issue
          await github.rest.issues.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            state: 'closed'
          });
